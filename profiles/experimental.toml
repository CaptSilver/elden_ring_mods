# Testbed for mods that aren't trusted in the shared stack yet. Composes
# seamless-full, so `erm switch experimental` gives you the whole co-op setup
# plus whatever's being tried out — switching to a standalone profile would
# uninstall Seamless along with everything else.
name = "experimental"
description = "seamless-full plus whatever is currently on trial. Empty right now — both candidates were rejected, and the notes below record why so they don't get re-added. Applying this is identical to applying seamless-full until something new goes in. Nothing here is ever required by co-op partners."

includes = ["seamless-full"]

# --- tried and rejected ---
# map-for-goblins (#10062, DLL rebuild) DISABLED — loads and runs fine, but its
# overlay takes no controller input, which makes it unusable for a controller
# playthrough. The mod documents Y+R3 as the panel toggle; that didn't work
# here. Nothing wrong with the install, so "it loads" is not the bar — don't
# re-add it on that basis.
#
# To re-enable: nexus_id=10062, file_id=48311, kind="qol", install="mods".
# The file_id matters: the mod publishes NINE files under MAIN at once, one per
# overhaul (ERR, Convergence, ERTE, Graceborne…), all sharing a version, so
# version alone can't pick between them — 48311 is "Vanilla or Randomizer".
# Take the DLL rebuild, never the original (#3091): that one ships a
# regulation.bin and would fight Clever's Moveset for the single slot, while
# this one injects its map data at runtime.

# questpath (#10363) DISABLED — it kills the game during startup on this box.
# Every launch with it died ~10ms after its own log recorded "DXGI creation
# hooks installed" and "NVIDIA NVAPI HDR observer installed", between me3's
# wwise and device_manager asset hooks, taking Elden Mod Loader down mid-DLL-
# loop with it (mod_loader_log.txt truncates after the first entry instead of
# reaching "Loaded N .dll mods"). Removing it fixed the boot with nothing else
# changed. Untested theory: it fights ReShade, which already owns dxgi.dll here
# — so it may be fine on a machine without ReShade. The NVAPI hook on a Radeon
# is the other suspect.
#
# To re-enable: nexus_id=10363, kind="qol", install="me3-native". It needs
# me3-native rather than "mods" because its dll sits inside a QuestPath/ folder
# and Elden Mod Loader only scans mods/*.dll — it never recurses. Try its ini's
# overlay toggle first; the quest tracking may work with the overlay off.
