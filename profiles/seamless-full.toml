# The full 2025 randomizer-coop stack. Requires a Nexus Premium key
# (NEXUS_API_KEY) to auto-fetch the Nexus-sourced mods; GitHub mods fetch
# without a key. `erm apply` installs Seamless Co-op straight into Game/;
# me3 and the randomizer are tools, not Game/ mods, so apply extracts them
# to tools/ and prints what to do next instead of placing files itself.
name = "seamless-full"
description = "The full 2025 randomizer-coop mod set: framework, loaders, randomizer, item spawners, cosmetics, and QoL."

# --- coop framework + loaders ---
[[mods]]
id = "seamless-coop"
source = "nexus"
nexus_id = 510
kind = "coop-framework"
install = "game"

[[mods]]
id = "elden-mod-loader"           # dinput8 loader for the DLL mods
source = "nexus"
nexus_id = 117
kind = "loader"
install = "game"

[[mods]]
id = "me3"                        # modern loader (replaces the old ModEngine2)
source = "github"
repo_id = 540883721
asset_match = "me3-windows-amd64"
kind = "loader"
install = "me3"

# --- randomizer (ALL players need the identical generated regulation.bin + seed) ---
[[mods]]
id = "item-enemy-randomizer"
source = "nexus"
nexus_id = 428
kind = "randomizer"
requires_all_players = true
install = "randomizer"

# --- item spawners: BAN-RELEVANT. Client-side under seamless, but can put
#     illegitimate items in your save. This is what erm quarantine/doctor guard. ---
[[mods]]
id = "glorious-merchant"
source = "nexus"
nexus_id = 5192
kind = "item-cheat"
install = "mods"

[[mods]]
id = "erd-tools"                  # GitHub only (author forbids Nexus reuploads)
source = "github"
repo_id = 514620889
asset_match = "For.Dummies"       # the only .zip asset; .7z main can't be auto-extracted
kind = "item-cheat"
install = "mods"

# --- cosmetic (client-side, per-player, no lockstep) ---
