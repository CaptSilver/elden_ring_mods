# The full 2025 randomizer-coop stack. Requires a Nexus Premium key
# (NEXUS_API_KEY) to auto-fetch the Nexus-sourced mods; GitHub mods fetch
# without a key. `erm apply` installs Seamless Co-op straight into Game/;
# me3 and the randomizer are tools, not Game/ mods, so apply extracts them
# to tools/ and prints what to do next instead of placing files itself.
name = "seamless-full"
description = "The complete SHARED coop stack — the one profile the whole party runs. Composes gameplay-extras (Clever's Moveset, a shared regulation.bin mod), so `erm apply seamless-full` pulls in everything required to play together. Per-machine visuals (textures, ReShade) live in cosmetic-extras and are NOT needed by co-op partners."

# Compose the shared stack so this single profile is the complete "what your
# friends need" set:
#   - seamless-extras: the base coop framework (ersc), the DLL loader, and a
#     couple client-side QoL/cosmetics — defined ONCE there, not duplicated here.
#   - gameplay-extras: Clever's Moveset (the shared regulation.bin mod).
# cosmetic-extras stays separate (per-machine, not required for co-op).
includes = ["seamless-extras", "gameplay-extras"]

# --- loaders ---
# seamless-coop + elden-mod-loader come from the seamless-extras include above.
[[mods]]
id = "me3"                        # modern loader (replaces the old ModEngine2)
source = "github"
repo_id = 540883721
asset_match = "me3-windows-amd64"
kind = "loader"
install = "me3"

# --- randomizer (ALL players need the identical generated regulation.bin + seed) ---
# item-enemy-randomizer DISABLED (not in use). It's the other regulation-slot mod,
# and Clever's Moveset (in gameplay-extras) now claims that one slot. To re-enable,
# add the entry back: nexus_id=428, kind="randomizer", install="randomizer",
# requires_all_players=true — but only ONE regulation mod can be active at a time.

# --- item spawners: BAN-RELEVANT. Client-side under seamless, but can put
#     illegitimate items in your save. This is what erm quarantine/doctor guard. ---
# glorious-merchant (ermerchant.dll) DISABLED for now — the item-spawner shop
# overrode Merchant Kale, hiding Clever's Moveset weapons behind its own list.
# Pulled so Kale's real shop shows. To re-enable: uncomment and `erm apply
# seamless-full`. Was: nexus_id=5192, kind="item-cheat", install="mods".

[[mods]]
id = "erd-tools"                  # GitHub only (author forbids Nexus reuploads)
source = "github"
repo_id = 514620889
asset_match = "For.Dummies"       # the only .zip asset; .7z main can't be auto-extracted
kind = "item-cheat"
install = "mods"

# --- cosmetic (client-side, per-player, no lockstep) ---
[[mods]]
id = "erdyes"
source = "nexus"
nexus_id = 6927
kind = "cosmetic"
install = "mods"
[[mods]]
id = "ertransmogrify"
source = "nexus"
nexus_id = 3596
kind = "cosmetic"
install = "mods"
[[mods]]
id = "remove-chromatic-aberration"
source = "nexus"
nexus_id = 179
kind = "cosmetic"
install = "game"
# remove-vignette comes from the seamless-extras include.

# --- QoL (client-side) ---
# skip-the-intro comes from the seamless-extras include.
[[mods]]
id = "adjust-the-fov"
source = "nexus"
nexus_id = 325
kind = "qol"
install = "game"
[[mods]]
id = "camera-fix"
source = "nexus"
nexus_id = 118
kind = "qol"
install = "game"
[[mods]]
id = "increase-animation-distance"
source = "nexus"
nexus_id = 349
kind = "qol"
install = "game"
[[mods]]
id = "disable-rune-loss"
source = "nexus"
nexus_id = 376
kind = "qol"
install = "game"
[[mods]]
id = "no-weight"
source = "nexus"
nexus_id = 481
kind = "qol"
install = "mods"
[[mods]]
